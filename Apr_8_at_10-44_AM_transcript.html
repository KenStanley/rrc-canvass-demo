<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcript: Apr_8_at_10-44_AM.m4a</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #222;
  }

  /* ── Audio player bar ── */
  #player-bar {
    position: sticky;
    top: 0;
    background: #1a1a2e;
    color: #eee;
    padding: 10px 16px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #player-bar audio {
    flex: 1;
    min-width: 200px;
    height: 36px;
  }
  #current-time {
    font-size: 13px;
    color: #a29bfe;
    min-width: 80px;
    font-variant-numeric: tabular-nums;
  }
  #filename {
    font-size: 12px;
    color: #888;
    flex-basis: 100%;
  }

  /* ── Door sections ── */
  .door-section {
    margin: 16px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .door-header {
    background: #2d3561;
    color: #eee;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .door-header:hover { background: #3d4571; }
  .door-words {
    padding: 14px 16px;
    line-height: 2.2;
    font-size: 15px;
  }

  /* ── Word spans ── */
  .word {
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    transition: background 0.1s;
    display: inline;
  }
  .word:hover { background: #dfe6ff; }
  .word.playing {
    background: #ffd700;
    color: #000;
    font-weight: 500;
  }
  .word.played {
    color: #888;
  }
</style>
</head>
<body>

<div id="player-bar">
  <audio id="audio" controls src="Apr_8_at_10-44_AM.m4a">
    Your browser does not support audio playback.
  </audio>
  <span id="current-time">0:00.00</span>
  <span id="filename">Apr_8_at_10-44_AM.m4a</span>
</div>

<div id="transcript">

</div>

<script>
const audio = document.getElementById("audio");
const timeDisplay = document.getElementById("current-time");
const words = document.querySelectorAll(".word");

function seekTo(t) {
  audio.currentTime = t;
  audio.play();
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(2).padStart(5, "0");
  return m + ":" + sec;
}

audio.addEventListener("timeupdate", function() {
  const t = audio.currentTime;
  timeDisplay.textContent = formatTime(t);

  words.forEach(function(span) {
    const start = parseFloat(span.dataset.start);
    const end   = parseFloat(span.dataset.end);
    if (t >= start && t <= end) {
      span.classList.add("playing");
      span.classList.remove("played");
      // Scroll into view if needed
      const rect = span.getBoundingClientRect();
      if (rect.top < 80 || rect.bottom > window.innerHeight) {
        span.scrollIntoView({behavior: "smooth", block: "center"});
      }
    } else if (t > end) {
      span.classList.remove("playing");
      span.classList.add("played");
    } else {
      span.classList.remove("playing", "played");
    }
  });
});
</script>

</body>
</html>
